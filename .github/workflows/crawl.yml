name: Crawl Tieba & Deploy

on:
  schedule:
    # 每 2 小时运行一次 (UTC 时间，偶数小时的 0 分)
    - cron: "0 */2 * * *"
  # 允许手动触发
  workflow_dispatch:

# 需要写入仓库权限（用于推送更新后的 history.json / index.html）
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run crawler
        env:
          TIEBA_COOKIE: ${{ secrets.TIEBA_COOKIE }}
        run: python crawler.py

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json index.html
          if git diff --staged --quiet; then
            echo "No changes, skip commit"
          else
            git commit -m "Update data — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp history.json _site/
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
